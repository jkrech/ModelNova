sdsio:
  interface:
    usb:
  workdir: ./algorithm/SDS Recordings
  metadir: ./algorithm/SDS Recordings

  # Data stream information used by VS Code extension
  streams:
    - name: ML_In
      view: video
    - name: ML_Out
      view: signal
  
  # Human readable labels for sdsFlag bits use by VS Code extension
  flag-info:
    - 0: RECORD CAMERA
    - 1: HEALTH CHECK
    - 2: CONNECTIVITY CHECK
    - 3: INFERENCE TEST START/STOP
    - 4: DATA CAPTURE START/STOP

